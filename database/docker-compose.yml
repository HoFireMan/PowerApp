version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: energy_db
    environment:
      # 🔒 這裡改成讀取 .env 檔案裡面的密碼！
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Taipei
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped